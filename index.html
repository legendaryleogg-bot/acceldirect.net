<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCEL DIRECT LLC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 640px;
            padding: 2rem;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #444, transparent);
            margin: 0 auto 2rem;
        }
        .description {
            font-size: 1rem;
            line-height: 1.7;
            color: #aaa;
            margin-bottom: 2.5rem;
        }
        .contact {
            font-size: 0.9rem;
            color: #666;
        }
        .contact a {
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid #333;
            transition: color 0.2s, border-color 0.2s;
        }
        .contact a:hover {
            color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ACCEL DIRECT</div>
        <div class="tagline">Advertising &amp; Marketing</div>
        <div class="divider"></div>
        <p class="description">
            We build automated lead generation systems that connect businesses
            with qualified prospects. Performance-driven. Results-measured.
        </p>
        <p class="contact">
            <a href="mailto:support@legendaryleo.com">support@legendaryleo.com</a>
        </p>
    </div>
</body>
</html>
